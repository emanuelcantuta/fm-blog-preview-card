<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Main content -->

<main>
  <article class="card">
    <img src="./assets/images/illustration-article.svg" alt="Illustration of an article">
    <div class="card-content">  
      <span class="tag">Learning</span>
      <p class="date"><time datetime="2023-12-21">Published 21 Dec 2023</time></p>    
      <h1><a href="#">HTML & CSS foundations</a></h1>
      <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <footer class="author">
      <img src="./assets/images/image-avatar.webp" alt="Greg Hooper's avatar">
      <strong>Greg Hooper</strong>
    </footer>
  </article>
</main>


</body>
</html>
